<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Caltrain Live</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: var(--bg-light); color: var(--bg-dark); }
        @media (prefers-color-scheme: dark) { body { background: var(--bg-dark); color: var(--bg-light); } }
        .content { max-width: 600px; margin: 60px auto; padding: 20px; line-height: 1.6; }
        .btn { display: inline-block; padding: 12px 24px; background: var(--primary); color: white; text-decoration: none; border-radius: 12px; font-weight: 600; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="content animate-fade">
        <a href="/" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Back to Board</a>
        <h1>Contact Us</h1>
        <p>Have feedback or spotted a delay not shown on the board? Reach out to our developer team via Telegram.</p>
        <a href="https://t.me/emin249" target="_blank" class="btn">Message on Telegram</a>
    </div>
</body>
</html>
